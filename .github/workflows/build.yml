name: Build KeePass Sorter Plugin

on:
  push:
    branches: [ "*" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Cấp quyền ghi để cho phép tạo GitHub Release và tải tài sản lên

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download and Setup KeePass
      shell: powershell
      run: |
        # Đặt KeePass dependency trong thư mục lib/ của repository
        $libDir = [System.IO.Path]::GetFullPath("$env:GITHUB_WORKSPACE\lib")
        New-Item -ItemType Directory -Path $libDir -Force | Out-Null
        Write-Host "Downloading KeePass to: $libDir"
        
        # Tải KeePass Portable từ link chính thức của SourceForge (sử dụng curl -L để tự động chuyển hướng)
        curl.exe -L -o "$libDir\KeePass.zip" "https://sourceforge.net/projects/keepass/files/KeePass%202.x/2.61.1/KeePass-2.61.1.zip/download"
        $header = [System.IO.File]::ReadAllBytes("$libDir\KeePass.zip")[0..1]
        if (($header[0] -ne 0x50) -or ($header[1] -ne 0x4B)) {
            throw "KeePass download did not return a zip file."
        }
        
        # Giải nén
        Expand-Archive -Path "$libDir\KeePass.zip" -DestinationPath $libDir -Force
        Remove-Item "$libDir\KeePass.zip" -Force
        
        # Xác nhận KeePass.exe đã nằm đúng vị trí
        if (Test-Path "$libDir\KeePass.exe") {
            Write-Host "KeePass.exe successfully extracted to: $libDir\KeePass.exe"
        } else {
            throw "Failed to extract KeePass.exe!"
        }

    - name: Run SortingEngine Tests
      shell: powershell
      run: |
        $libDir = [System.IO.Path]::GetFullPath("$env:GITHUB_WORKSPACE\lib")
        $testExe = "$libDir\KeePassSorter.Tests.exe"

        & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" `
          /nologo `
          /target:exe `
          /out:$testExe `
          /reference:"$libDir\KeePass.exe" `
          /reference:"C:\Windows\Microsoft.NET\Framework64\v4.0.30319\System.dll" `
          "$env:GITHUB_WORKSPACE\src\SortingEngine.cs" `
          "$env:GITHUB_WORKSPACE\src\UpdateChecker.cs" `
          "$env:GITHUB_WORKSPACE\src\SortingDialogOptionsState.cs" `
          "$env:GITHUB_WORKSPACE\tests\SortingEngineBehaviorTests.cs"

        & $testExe

    - name: Build DLL Plugin
      shell: powershell
      run: |
        $libDir = [System.IO.Path]::GetFullPath("$env:GITHUB_WORKSPACE\lib")
        # Ghi đè ReferencePath để đảm bảo MSBuild tìm thấy KeePass.exe trong lib/
        msbuild src/KeePassSorter.csproj /p:Configuration=Release /p:Platform="AnyCPU" /p:ReferencePath="$libDir"

    - name: Create PLGX Package
      shell: powershell
      run: |
        $libDir = [System.IO.Path]::GetFullPath("$env:GITHUB_WORKSPACE\lib")
        $keepassExe = "$libDir\KeePass.exe"
        
        # Đóng gói thư mục src/ thành file .plgx bằng KeePass.exe
        Write-Host "Packing PLGX using KeePass..."
        & $keepassExe --plgx-create "$env:GITHUB_WORKSPACE\src"
        
        # Chờ 5 giây để quá trình đóng gói hoàn tất
        Start-Sleep -Seconds 5
        
        # KeePass tạo ra file src.plgx cùng cấp với thư mục src (tức là trong workspace root)
        # Chúng ta chỉ cần đổi tên nó thành KeePassSorter.plgx
        $compiledPlgx = "$env:GITHUB_WORKSPACE\src.plgx"
        if (Test-Path $compiledPlgx) {
            Move-Item $compiledPlgx "$env:GITHUB_WORKSPACE\KeePassSorter.plgx" -Force
            Write-Host "PLGX created successfully at $env:GITHUB_WORKSPACE\KeePassSorter.plgx!"
        } else {
            throw "Failed to create PLGX package!"
        }

    - name: Upload DLL and PLGX Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KeePassSorter-Plugin
        path: |
          bin/Release/KeePassSorter.dll
          KeePassSorter.plgx

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          bin/Release/KeePassSorter.dll
          KeePassSorter.plgx
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
